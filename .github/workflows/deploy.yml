name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync notes from Obsidian vault
        env:
          OBSIDIAN_VAULT_REPO: ${{ secrets.OBSIDIAN_VAULT_REPO }}
          OBSIDIAN_VAULT_TOKEN: ${{ secrets.OBSIDIAN_VAULT_TOKEN }}
        run: |
          if [ -n "$OBSIDIAN_VAULT_REPO" ] && [ -n "$OBSIDIAN_VAULT_TOKEN" ]; then
            git clone "https://x-access-token:${OBSIDIAN_VAULT_TOKEN}@github.com/${OBSIDIAN_VAULT_REPO}" /tmp/obsidian-vault --depth 1
            
            # 清理旧笔记
            rm -rf src/content/notes/*
            
            # 复制笔记（排除二掌柜的酒铺和内部文件）
            for dir in /tmp/obsidian-vault/*/; do
              dirname=$(basename "$dir")
              if [[ "$dirname" == *"二掌柜"* ]] || [[ "$dirname" == ".*" ]]; then
                echo "⏭️ 跳过: $dirname"
                continue
              fi
              if ls "$dir"*.md 1>/dev/null 2>&1; then
                echo "📝 同步: $dirname"
                mkdir -p "src/content/notes/$dirname"
                find "$dir" -name "*.md" -maxdepth 1 | while read f; do
                  fname=$(basename "$f")
                  # 跳过 README、归档规范等内部文件
                  if [[ "$fname" == "README.md" ]] || [[ "$fname" == *"归档规范"* ]] || [[ "$fname" == *"排版规范"* ]] || [[ "$fname" == *"模板"* ]]; then
                    echo "  ⏭️ 跳过内部文件: $fname"
                    continue
                  fi
                  cp "$f" "src/content/notes/$dirname/"
                done
              fi
            done
            
            note_count=$(find src/content/notes -name "*.md" | wc -l)
            echo "✅ 同步完成，共 $note_count 篇笔记"
          else
            echo "⚠️ Obsidian vault 未配置，使用已有笔记"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
