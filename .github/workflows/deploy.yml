name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync notes from Obsidian vault
        env:
          OBSIDIAN_VAULT_REPO: ${{ secrets.OBSIDIAN_VAULT_REPO }}
          OBSIDIAN_VAULT_TOKEN: ${{ secrets.OBSIDIAN_VAULT_TOKEN }}
        run: |
          if [ -z "$OBSIDIAN_VAULT_REPO" ] || [ -z "$OBSIDIAN_VAULT_TOKEN" ]; then
            echo "⚠️ Vault 未配置，使用仓库中已有笔记"
            note_count=$(find src/content/notes -name "*.md" 2>/dev/null | wc -l)
            echo "📝 当前笔记数: $note_count"
            exit 0
          fi

          echo "📥 克隆 Obsidian vault..."
          if ! git clone "https://x-access-token:${OBSIDIAN_VAULT_TOKEN}@github.com/${OBSIDIAN_VAULT_REPO}" /tmp/obsidian-vault --depth 1 2>&1; then
            echo "❌ Vault 克隆失败，使用仓库中已有笔记"
            note_count=$(find src/content/notes -name "*.md" 2>/dev/null | wc -l)
            echo "📝 当前笔记数: $note_count"
            exit 0
          fi

          # 清理旧笔记
          rm -rf src/content/notes/*

          # 复制笔记（排除私密和内部文件）
          for dir in /tmp/obsidian-vault/*/; do
            dirname=$(basename "$dir")
            # 跳过私密文件夹
            if [[ "$dirname" == *"二掌柜"* ]] || [[ "$dirname" == ".*" ]]; then
              echo "⏭️ 跳过私密: $dirname"
              continue
            fi
            # 复制 md 文件（含子目录）
            find "$dir" -name "*.md" ! -name "README.md" | while read f; do
              fname=$(basename "$f")
              # 跳过内部文件
              if [[ "$fname" == *"归档规范"* ]] || [[ "$fname" == *"排版规范"* ]] || [[ "$fname" == *"模板"* ]]; then
                continue
              fi
              # 保持子目录结构
              relpath="${f#/tmp/obsidian-vault/}"
              mkdir -p "src/content/notes/$(dirname "$relpath")"
              cp "$f" "src/content/notes/$relpath"
            done
          done

          # 脱敏：移除收益相关段落
          echo "🔒 脱敏处理..."
          find src/content/notes -name "*.md" -exec sed -i \
            -e '/^## 💰 收益概览/,/^## \|^---$/d' \
            -e '/^## 💰 今日收益明细/,/^## \|^---$/d' \
            -e '/^### 持仓明细/,/^## \|^---$/d' \
            -e '/^## 🔮 盘前走势预测/,/^## \|^---$/d' \
            -e '/^## 📝 投资总结/,/^## \|^---$/d' \
            {} +

          note_count=$(find src/content/notes -name "*.md" | wc -l)
          echo "✅ 同步完成，共 $note_count 篇笔记（已脱敏）"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
